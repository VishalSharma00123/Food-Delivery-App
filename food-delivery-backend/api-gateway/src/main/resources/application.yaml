server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # ============ ROUTE DEFINITIONS ============
      routes:

        # ---------- AUTH SERVICE ----------
        # Lower rate limit – brute-force protection (10 req/s, burst 20)
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authServiceCB
                fallbackUri: forward:/fallback/auth
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@authRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        # ---------- RESTAURANT SERVICE (Public GET) ----------
        # Public reads – generous limit (50 req/s, burst 100)
        - id: restaurant-service-public
          uri: ${RESTAURANT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/restaurants/**
            - Method=GET
          filters:
            - name: CircuitBreaker
              args:
                name: restaurantServiceCB
                fallbackUri: forward:/fallback/restaurant
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@publicReadRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        # ---------- RESTAURANT SERVICE (Authenticated writes) ----------
        # Secured mutations – per-user limit (30 req/s, burst 60)
        - id: restaurant-service-secured
          uri: ${RESTAURANT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/restaurants/**
            - Method=POST,PUT,PATCH,DELETE
          filters:
            - name: CircuitBreaker
              args:
                name: restaurantServiceCB
                fallbackUri: forward:/fallback/restaurant
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@authenticatedRateLimiter}"
                key-resolver: "#{@userKeyResolver}"

        # ---------- ORDER SERVICE ----------
        # Transactional – per-user limit (30 req/s, burst 60)
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderServiceCB
                fallbackUri: forward:/fallback/order
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@authenticatedRateLimiter}"
                key-resolver: "#{@userKeyResolver}"

        # ---------- PAYMENT SERVICE ----------
        # High-value endpoints – per-user limit (30 req/s, burst 60)
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/payments/**
          filters:
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback/payment
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@authenticatedRateLimiter}"
                key-resolver: "#{@userKeyResolver}"

        # ---------- NOTIFICATION SERVICE ----------
        # Internal use – moderate limit (20 req/s, burst 40)
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notification
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@notificationRateLimiter}"
                key-resolver: "#{@userKeyResolver}"

      # Default filters applied to ALL routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      # Global CORS
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

  # ============ REDIS ============
  # Used by Spring Cloud Gateway's built-in RequestRateLimiter (Token Bucket)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}        # blank = no auth (change in prod)
      timeout: 2000ms                     # command timeout
      connect-timeout: 1000ms
      lettuce:
        pool:
          max-active: 16    # max simultaneous connections
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms  # block at most 1 s before error

# JWT config – MUST match auth-service exactly
jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyThatIsAtLeast32BytesLong12345}

# ============ RESILIENCE4J CIRCUIT BREAKER ============
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 5
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2000
    instances:
      authServiceCB:
        baseConfig: default
      restaurantServiceCB:
        baseConfig: default
      orderServiceCB:
        baseConfig: default
      paymentServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 5s

# ============ ACTUATOR ============
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# ============ LOGGING ============
logging:
  level:
    com.api_gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.data.redis: WARN